<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>UNITFIRE STUDIOS // OMNIRA INTEGRATED</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        /* 1. GÖRSEL DÜNYA (Otoban + Stüdyo) */
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:#050507; color:#fff; font-family:'Rajdhani', sans-serif; overflow-x:hidden; }
        nav { position:fixed; top:0; width:100%; padding:40px; display:flex; justify-content:space-between; z-index:1000; background:rgba(0,0,0,0.6); }
        .links a { margin-left:30px; color:#fff; text-decoration:none; cursor:pointer; font-size:0.8rem; letter-spacing:2px; }
        #roadCanvas { position:fixed; top:0; left:0; width:100%; height:100%; z-index:-1; }
        
        /* 2. OMNIRA YÖNETİM PANELİ (Admin + AI) */
        #omnira-ui { display:none; position:fixed; top:100px; right:50px; width:500px; height:80vh; background:#1a1a1a; border:2px solid #41bbff; z-index:9999; border-radius:15px; padding:25px; overflow-y:auto; }
        .input-box { width:100%; padding:12px; margin:10px 0; background:#000; border:1px solid #333; color:#fff; }
        .btn { width:100%; padding:12px; background:#41bbff; border:none; cursor:pointer; color:#000; font-weight:bold; }
    </style>
</head>
<body>

    <nav>
        <div class="logo">UNITFIRE STUDIOS</div>
        <div class="links">
            <a href="#home">HOME</a>
            <a onclick="document.getElementById('omnira-ui').style.display='block'">ARTIFICIAL INTELLIGENCE - AI</a>
            <a href="#management">ADMIN PANEL</a>
        </div>
    </nav>

    <canvas id="roadCanvas"></canvas>

    <div id="omnira-ui">
        <h2 style="color:#41bbff; font-family:'Orbitron';">SYSTEM CONTROL</h2>
        
        <div id="login-block">
            <input id="email" class="input-box" placeholder="ID / E-mail">
            <input id="pass" type="password" class="input-box" placeholder="Password">
            <button class="btn" onclick="login()">SİSTEME GİRİŞ YAP</button>
        </div>

        <div id="panel-block" style="display:none;">
            <div id="chat-box" style="height:350px; background:#000; margin-bottom:15px; overflow-y:scroll; padding:10px;"></div>
            <input id="msg" class="input-box" placeholder="Komut yaz...">
            <button class="btn" onclick="send()">KOMUT GÖNDER</button>
            <button class="btn" style="background:#e05555; margin-top:10px;" onclick="location.reload()">ÇIKIŞ YAP</button>
        </div>
    </div>

    <script>
        // OTOBAN EFEKTİ
        const canvas = document.getElementById('roadCanvas');
        const ctx = canvas.getContext('2d');
        function draw() {
            ctx.fillStyle = 'rgba(0,0,0,0.15)'; ctx.fillRect(0,0,window.innerWidth, window.innerHeight);
            ctx.strokeStyle = '#41bbff'; ctx.beginPath();
            ctx.moveTo(window.innerWidth/2, window.innerHeight); ctx.lineTo(window.innerWidth/2 - 400, 0);
            ctx.moveTo(window.innerWidth/2, window.innerHeight); ctx.lineTo(window.innerWidth/2 + 400, 0);
            ctx.stroke();
            requestAnimationFrame(draw);
        }
        draw();

        // OMNIRA YÖNETİM
        async function login() {
            document.getElementById('login-block').style.display = 'none';
            document.getElementById('panel-block').style.display = 'block';
        }

        async function send() {
            const m = document.getElementById('msg').value;
            const res = await fetch('/chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({messages: [{role: 'user', content: m}]})
            });
            const d = await res.json();
            document.getElementById('chat-box').innerHTML += `<p><b>Siz:</b> ${m}</p><p style="color:#41bbff;"><b>Omnira:</b> ${d.choices[0].message.content}</p>`;
        }
    </script>
</body>
</html>
