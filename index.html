<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Unitfire Studios</title>
    <style>
        body, html { margin: 0; padding: 0; background: #050507; color: #fff; font-family: -apple-system, sans-serif; overflow-x: hidden; }
        
        /* Menü */
        nav { position: fixed; top: 40px; left: 40px; z-index: 999; display: flex; gap: 30px; text-transform: uppercase; font-size: 0.7rem; letter-spacing: 2px; }
        nav a { color: #555; text-decoration: none; transition: 0.3s; }
        nav a:hover { color: #fff; }
        
        section { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; }
        
        /* Otoban Canvas */
        #roadCanvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; }
        
        .content { position: relative; z-index: 10; text-align: center; }
        h1 { font-size: 3.5rem; margin-bottom: 20px; font-family: serif; }
        .auth-box { background: #0a0a0c; padding: 40px; border: 1px solid #1a1a1a; width: 300px; }
        input, button { width: 100%; padding: 10px; margin: 5px 0; background: #000; border: 1px solid #333; color: #fff; }
        button { cursor: pointer; background: #fff; color: #000; font-weight: bold; }
    </style>
</head>
<body>
    <nav>
        <a href="#home">Home</a><a href="#games">Games</a><a href="#management">Management</a>
    </nav>
    
    <section id="home">
        <div class="content"><h1>Every Pixel Tells a Story</h1></div>
    </section>

    <section id="games">
        <canvas id="roadCanvas"></canvas>
        <div class="content"><h2>Small Team. Vast Worlds.</h2><p>Code. Tell. Touch.</p></div>
    </section>

    <section id="management">
        <div class="content">
            {% if not current_user.is_authenticated %}
            <div class="auth-box">
                <form action="/login" method="POST"><input name="username" placeholder="User"><input type="password" name="password" placeholder="Pass"><button>LOGIN</button></form>
                <form action="/register" method="POST"><input name="username" placeholder="New User"><input type="password" name="password" placeholder="Pass"><button>REGISTER</button></form>
            </div>
            {% else %}
            <h3>Logged as: {{ current_user.username }}</h3>
            <a href="/logout">Logout</a>
            {% endif %}
        </div>
    </section>

    <script>
        const canvas = document.getElementById('roadCanvas');
        const ctx = canvas.getContext('2d');
        let w, h;

        function resize() {
            w = canvas.width = canvas.parentElement.offsetWidth;
            h = canvas.height = canvas.parentElement.offsetHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        let path = { pos: 0 };
        function draw() {
            ctx.fillStyle = 'rgba(5, 5, 7, 0.15)'; 
            ctx.fillRect(0, 0, w, h);
            
            path.pos += 8; // Otoban hızı
            if(path.pos > 100) path.pos = 0;

            // İki ana yol hattı (Pembe ve Turkuaz)
            drawLane(w/2 - 150, '#ff52a3'); 
            drawLane(w/2 + 150, '#41bbff');
            
            requestAnimationFrame(draw);
        }

        function drawLane(x, color) {
            ctx.beginPath();
            ctx.strokeStyle = color;
            ctx.lineWidth = 4;
            // Perspektif efektiyle aşağı doğru akan çizgiler
            for(let i=0; i<10; i++) {
                let y = (i * 100 + path.pos) % h;
                ctx.moveTo(x, y);
                ctx.lineTo(x, y + 50);
            }
            ctx.stroke();
        }
        draw();
    </script>
</body>
</html>
