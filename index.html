<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Unitfire Studios</title>
    <style>
        body, html { margin:0; padding:0; background:#050507; color:#fff; font-family:-apple-system, sans-serif; overflow:hidden; }
        
        /* Minimalist Nav */
        nav { position:fixed; top:40px; width:100%; display:flex; justify-content:center; gap:40px; z-index:999; text-transform:uppercase; font-size:0.7rem; letter-spacing:2px; }
        nav a { color:#555; text-decoration:none; transition:0.3s; } nav a:hover { color:#fff; }
        
        /* Canvaslar (Arkaplan) */
        canvas { position:fixed; top:0; left:0; width:100%; height:100%; z-index:-1; }
        
        /* Tek Giriş Kutusu */
        .auth-container { position:fixed; bottom:50px; left:50%; transform:translateX(-50%); z-index:100; text-align:center; }
        .auth-box { display:flex; gap:10px; background:rgba(0,0,0,0.5); padding:15px; border:1px solid #222; }
        input { background:transparent; border:1px solid #333; color:#fff; padding:5px 10px; }
        button { background:#fff; color:#000; border:none; padding:5px 15px; cursor:pointer; font-weight:bold; }
        
        /* Admin Panel */
        .admin-panel { position:fixed; top:100px; left:50px; background:#0a0a0c; padding:20px; border:1px solid #41bbff; color:#fff; font-size:0.8rem; }
    </style>
</head>
<body>

    <nav>
        <a href="#home">HOME</a>
        <a href="#games">GAMES</a>
        <a href="#support">SUPPORT</a>
    </nav>

    <canvas id="warpCanvas"></canvas>
    <canvas id="roadCanvas"></canvas>

    <div class="auth-container">
        {% if not current_user.is_authenticated %}
        <form action="/login" method="POST" class="auth-box">
            <input name="username" placeholder="Username">
            <input type="password" name="password" placeholder="Pass">
            <button type="submit">GİRİŞ / KAYIT</button>
        </form>
        {% else %}
        <div class="auth-box">
            <span>{{ current_user.username }}</span>
            <a href="/logout" style="color:#ff52a3;">ÇIKIŞ</a>
        </div>
        {% endif %}
    </div>

    {% if current_user.is_authenticated and current_user.role in ['Yönetici', 'Administrator'] %}
    <div class="admin-panel">
        <h4>YÖNETİM</h4>
        {% for u in all_users %}
        <div style="margin-bottom:5px;">{{ u.username }} 
            <form action="/update_role" method="POST" style="display:inline;">
                <input type="hidden" name="user_id" value="{{ u.id }}">
                <select name="role" onchange="this.form.submit()">
                    <option value="Üye" {% if u.role=='Üye' %}selected{% endif %}>Üye</option>
                    <option value="Yönetici" {% if u.role=='Yönetici' %}selected{% endif %}>Yönetici</option>
                </select>
            </form>
        </div>
        {% endfor %}
    </div>
    {% endif %}

    <script>
        // Arkaplan efektlerini çalıştıran script aynı kalacak
        const wC = document.getElementById('warpCanvas'), wCtx = wC.getContext('2d');
        const rC = document.getElementById('roadCanvas'), rCtx = rC.getContext('2d');
        let w = wC.width = rC.width = window.innerWidth;
        let h = wC.height = rC.height = window.innerHeight;

        function animate() {
            wCtx.fillStyle = 'rgba(5,5,7,0.1)'; wCtx.fillRect(0,0,w,h);
            rCtx.fillStyle = 'rgba(5,5,7,0.05)'; rCtx.fillRect(0,0,w,h);
            // Otoban Çizimi
            rCtx.strokeStyle = '#41bbff'; rCtx.lineWidth = 2;
            [w/2-150, w/2+150].forEach(x => {
                rCtx.beginPath(); rCtx.moveTo(x, 0); rCtx.lineTo(x, h); rCtx.stroke();
            });
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
