<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Unitfire Studios</title>
    <style>
        body, html { margin: 0; padding: 0; background: #050507; color: #fff; font-family: -apple-system, sans-serif; overflow-x: hidden; }
        
        nav { position: fixed; top: 40px; left: 40px; z-index: 999; display: flex; gap: 30px; text-transform: uppercase; font-size: 0.7rem; letter-spacing: 2px; }
        nav a { color: #555; text-decoration: none; transition: 0.3s; }
        nav a:hover { color: #fff; }
        
        section { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; }
        
        /* Canvaslar */
        #warpCanvas, #roadCanvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; }
        
        .content { position: relative; z-index: 10; text-align: center; }
        .auth-box { background: #0a0a0c; padding: 40px; border: 1px solid #1a1a1a; width: 300px; z-index: 10; }
        input, button { width: 100%; padding: 10px; margin: 5px 0; background: #000; border: 1px solid #333; color: #fff; }
        button { cursor: pointer; background: #fff; color: #000; font-weight: bold; }
    </style>
</head>
<body>

    <nav>
        <a href="#home">HOME</a>
        <a href="#games">GAMES</a>
        <a href="#auth">MANAGEMENT</a>
    </nav>

    <section id="games">
        <canvas id="warpCanvas"></canvas>
        <canvas id="roadCanvas"></canvas>
        <div class="content"><h2>Small Team. Vast Worlds.</h2><p>Code. Tell. Touch.</p></div>
    </section>

    <section id="auth">
        <div class="auth-box">
            {% if not current_user.is_authenticated %}
            <form action="/login" method="POST"><input name="username" placeholder="User"><input type="password" name="password" placeholder="Pass"><button>LOGIN</button></form>
            {% else %}
            <h3>Logged as: {{ current_user.username }}</h3>
            <a href="/logout">Logout</a>
            {% endif %}
        </div>
    </section>

    <script>
        // Warp Efekti (Parçacıklar)
        const warpCanvas = document.getElementById('warpCanvas');
        const warpCtx = warpCanvas.getContext('2d');
        let w, h, particles = [];

        function initParticles() {
            w = warpCanvas.width = window.innerWidth;
            h = warpCanvas.height = window.innerHeight;
            particles = [];
            for(let i=0; i<150; i++) particles.push({x:Math.random()*w, y:Math.random()*h, z:Math.random()*1000, color: Math.random() > 0.5 ? '#41bbff' : '#ff52a3'});
        }

        function drawWarp() {
            warpCtx.fillStyle = 'rgba(5, 5, 7, 0.1)'; warpCtx.fillRect(0, 0, w, h);
            particles.forEach(p => {
                p.z -= 10; if(p.z <= 0) p.z = 1000;
                let sx = (p.x - w/2) * (1000/p.z) + w/2;
                let sy = (p.y - h/2) * (1000/p.z) + h/2;
                warpCtx.fillStyle = p.color; warpCtx.fillRect(sx, sy, 2, 2);
            });
            requestAnimationFrame(drawWarp);
        }

        // Otoban Efekti (Çizgiler)
        const roadCanvas = document.getElementById('roadCanvas');
        const roadCtx = roadCanvas.getContext('2d');
        let pathPos = 0;

        function drawRoad() {
            roadCtx.fillStyle = 'rgba(5, 5, 7, 0.05)'; roadCtx.fillRect(0, 0, w, h);
            pathPos += 8; if(pathPos > 100) pathPos = 0;
            drawLane(w/2 - 150, '#ff52a3'); 
            drawLane(w/2 + 150, '#41bbff');
            requestAnimationFrame(drawRoad);
        }

        function drawLane(x, color) {
            roadCtx.beginPath(); roadCtx.strokeStyle = color; roadCtx.lineWidth = 4;
            for(let i=0; i<10; i++) {
                let y = (i * 100 + pathPos) % h;
                roadCtx.moveTo(x, y); roadCtx.lineTo(x, y + 50);
            }
            roadCtx.stroke();
        }

        window.addEventListener('resize', initParticles);
        initParticles();
        drawWarp();
        drawRoad();
    </script>
</body>
</html>
